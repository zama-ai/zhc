[workspace]
members = [
    "hpuc_frontend",
    "hpuc_gui",
    "hpuc_ir",
    "hpuc_langs",
    "hpuc_bin",
    "hpuc_pipeline",
    "hpuc_sim",
    "hpuc_utils",
    "hpuc_builder",
]
resolver = "3"

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.9"

# Custom compilation profile
# Compiles much faster for tests and allows reasonable performance for iterating
[profile.devo]
inherits = "dev"
opt-level = 3
lto = "off"
debug-assertions = false
